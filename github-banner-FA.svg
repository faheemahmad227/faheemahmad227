<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdfbff"/>
      <stop offset="0.5" stop-color="#f0f6ff"/>
      <stop offset="1" stop-color="#e8f3fb"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f80ed"/>
      <stop offset="1" stop-color="#9b51e0"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8d8ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#d0b6ff" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd6a5" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffadad" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="260" rx="16" fill="url(#bgLight)"/>
  <rect x="1" y="1" width="998" height="258" rx="15" fill="none" stroke="#dbe7f3" stroke-width="2"/>

  <!-- Soft decorative blobs -->
  <circle cx="920" cy="30" r="90" fill="url(#blob1)"/>
  <circle cx="60" cy="240" r="70" fill="url(#blob2)"/>
  <circle cx="700" cy="255" r="45" fill="url(#blob1)"/>

  <!-- Sprinkled tech doodles -->
  <g font-family="Consolas, Menlo, monospace" font-weight="600">
    <text x="640" y="52" font-size="17" fill="#9b51e0" opacity="0.55" transform="rotate(-8 640 52)">{ RAG }</text>
    <text x="560" y="225" font-size="15" fill="#2f80ed" opacity="0.5" transform="rotate(6 560 225)">import torch</text>
    <text x="905" y="215" font-size="20" fill="#2f80ed" opacity="0.45" transform="rotate(-10 905 215)">&lt;/&gt;</text>
  </g>
  <g stroke="#2f80ed" stroke-width="1.6" opacity="0.4" fill="none">
    <path d="M615 100 l10 -14 l10 14 l-10 14 z"/>
  </g>
  <g fill="#f2b705" opacity="0.75">
    <path d="M585 140 l4.5 9 l10 1.5 l-7.2 7 l1.7 10 l-9 -4.7 l-9 4.7 l1.7 -10 l-7.2 -7 l10 -1.5 z"/>
  </g>

  <!-- Neural network motif (right side, light palette) -->
  <g opacity="0.9">
    <g stroke="#9db9d8" stroke-width="1.3">
      <line x1="770" y1="85" x2="850" y2="65"/>
      <line x1="770" y1="85" x2="850" y2="135"/>
      <line x1="770" y1="145" x2="850" y2="65"/>
      <line x1="770" y1="145" x2="850" y2="135"/>
      <line x1="770" y1="200" x2="850" y2="135"/>
      <line x1="770" y1="200" x2="850" y2="198"/>
      <line x1="850" y1="65" x2="925" y2="100"/>
      <line x1="850" y1="135" x2="925" y2="100"/>
      <line x1="850" y1="135" x2="925" y2="165"/>
      <line x1="850" y1="198" x2="925" y2="165"/>
    </g>
    <g>
      <circle cx="770" cy="85" r="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2.5"/>
      <circle cx="770" cy="145" r="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2.5"/>
      <circle cx="770" cy="200" r="8" fill="#ffffff" stroke="#2f80ed" stroke-width="2.5"/>
      <circle cx="850" cy="65" r="8" fill="#ffffff" stroke="#6c63ff" stroke-width="2.5"/>
      <circle cx="850" cy="135" r="8" fill="#ffffff" stroke="#6c63ff" stroke-width="2.5"/>
      <circle cx="850" cy="198" r="8" fill="#ffffff" stroke="#6c63ff" stroke-width="2.5"/>
      <circle cx="925" cy="100" r="8" fill="#ffffff" stroke="#9b51e0" stroke-width="2.5"/>
      <circle cx="925" cy="165" r="8" fill="#ffffff" stroke="#9b51e0" stroke-width="2.5"/>
    </g>
  </g>

  <!-- Greeting -->
  <text x="64" y="82" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#5b7a99">Hi there 👋 I'm</text>

  <!-- Name with gradient -->
  <text x="62" y="138" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="url(#accentL)" letter-spacing="0.5">Faheem Ahmad</text>

  <!-- Title line -->
  <text x="64" y="176" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#3d5a80" letter-spacing="0.3">MSc Computer Science @ Paderborn University  ·  Ex-SWE @ Cognizant</text>

  <!-- Tech line as pill-style monospace -->
  <text x="64" y="210" font-family="Consolas, Menlo, monospace" font-size="15" fill="#2f80ed" letter-spacing="0.4">RAG · LLMs · PyTorch · FastAPI · Azure</text>

  <!-- Accent underline -->
  <rect x="64" y="222" width="120" height="4" rx="2" fill="url(#accentL)"/>
</svg>

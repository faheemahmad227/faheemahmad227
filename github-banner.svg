<svg width="1000" height="240" viewBox="0 0 1000 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#1b263b"/>
      <stop offset="1" stop-color="#16324f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4cc9f0"/>
      <stop offset="1" stop-color="#7b2ff7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="240" rx="14" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g fill="#4cc9f0" opacity="0.08">
    <circle cx="60" cy="40" r="2"/><circle cx="120" cy="40" r="2"/><circle cx="180" cy="40" r="2"/>
    <circle cx="60" cy="90" r="2"/><circle cx="120" cy="90" r="2"/><circle cx="180" cy="90" r="2"/>
    <circle cx="60" cy="140" r="2"/><circle cx="120" cy="140" r="2"/><circle cx="180" cy="140" r="2"/>
    <circle cx="60" cy="190" r="2"/><circle cx="120" cy="190" r="2"/><circle cx="180" cy="190" r="2"/>
  </g>

  <!-- Neural network motif (right side) -->
  <g opacity="0.85">
    <!-- edges -->
    <g stroke="#4cc9f0" stroke-width="1.2" opacity="0.35">
      <line x1="790" y1="70" x2="870" y2="50"/>
      <line x1="790" y1="70" x2="870" y2="120"/>
      <line x1="790" y1="130" x2="870" y2="50"/>
      <line x1="790" y1="130" x2="870" y2="120"/>
      <line x1="790" y1="190" x2="870" y2="120"/>
      <line x1="790" y1="190" x2="870" y2="190"/>
      <line x1="870" y1="50" x2="945" y2="85"/>
      <line x1="870" y1="120" x2="945" y2="85"/>
      <line x1="870" y1="120" x2="945" y2="155"/>
      <line x1="870" y1="190" x2="945" y2="155"/>
    </g>
    <!-- nodes -->
    <g>
      <circle cx="790" cy="70" r="7" fill="#1b263b" stroke="#4cc9f0" stroke-width="2"/>
      <circle cx="790" cy="130" r="7" fill="#1b263b" stroke="#4cc9f0" stroke-width="2"/>
      <circle cx="790" cy="190" r="7" fill="#1b263b" stroke="#4cc9f0" stroke-width="2"/>
      <circle cx="870" cy="50" r="7" fill="#1b263b" stroke="#7b8ff7" stroke-width="2"/>
      <circle cx="870" cy="120" r="7" fill="#1b263b" stroke="#7b8ff7" stroke-width="2"/>
      <circle cx="870" cy="190" r="7" fill="#1b263b" stroke="#7b8ff7" stroke-width="2"/>
      <circle cx="945" cy="85" r="7" fill="#1b263b" stroke="#7b2ff7" stroke-width="2"/>
      <circle cx="945" cy="155" r="7" fill="#1b263b" stroke="#7b2ff7" stroke-width="2"/>
    </g>
  </g>

  <!-- Accent bar -->
  <rect x="64" y="74" width="52" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Name -->
  <text x="64" y="126" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="0.5">Faheem Ahmad</text>

  <!-- Title line -->
  <text x="64" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#a8c5e0" letter-spacing="0.3">ML Engineer in the making  ·  MSc Computer Science @ Paderborn University</text>

  <!-- Sub line -->
  <text x="64" y="192" font-family="Consolas, Menlo, monospace" font-size="15" fill="#4cc9f0" letter-spacing="0.3">RAG · LLMs · PyTorch · FastAPI · Azure  |  Ex-SWE @ Cognizant</text>
</svg>
